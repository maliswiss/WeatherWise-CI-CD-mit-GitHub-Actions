server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA-Fallback: alle nicht gefundenen Routen liefern index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Statische Assets aggressiv cachen
  location ~* \.(?:js|css|png|svg|webp|ico)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
  }
}
